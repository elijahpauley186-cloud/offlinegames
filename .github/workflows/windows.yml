name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build EXE
        run: |
          # 1. Install nativefier globally
          npm install -g nativefier
          
          # 2. Build the exe using your brand name and ID
          # We use the app-id to match your identifier
          nativefier --name "Offline Games" \
          --app-name "Offline Games" \
          --app-version "1.0.0" \
          --app-id "com.dumbgames.offlinegames" \
          --single-instance \
          --internal-urls ".*" \
          . ./build
          
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: OfflineGames-Windows
          path: build/Offline\ Games-win32-x64/Offline\ Games.exe
