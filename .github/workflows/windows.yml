name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build EXE
        run: |
          # Install nativefier
          npm install -g nativefier
          
          # Build the exe with branding and your icon from the assets folder
          # Make sure 'icon.png' matches the actual name of your file in assets/
          nativefier --name "Offline Games" \
          --app-id "com.dumbgames.offlinegames" \
          --icon "assets/icon.png" \
          --single-instance \
          --internal-urls ".*" \
          . ./build
          
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: OfflineGames-Windows
          path: build/Offline Games-win32-x64/Offline Games.exe
