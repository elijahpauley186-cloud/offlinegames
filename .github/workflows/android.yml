name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Install with legacy-peer-deps to avoid the main dependency tree conflict
      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      # Install Android platform package pinned to your core version and add it
      - name: Add Android Platform
        run: |
          npm install @capacitor/android@6.2.1 --legacy-peer-deps
          npx cap add android

      # Sync web assets to the android folder
      - name: Sync Android
        run: |
          mkdir -p dist
          npx cap sync android

      # Build the debug APK
      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OfflineGames-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
