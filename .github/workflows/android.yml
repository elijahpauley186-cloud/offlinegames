name: Build Android APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node & Java
        uses: actions/setup-node@v4
        with: {node-version: 20}
      - uses: actions/setup-java@v4
        with: {java-version: '17', distribution: 'temurin'}

      - name: Build Web Assets
        run: |
          mkdir -p dist
          # This ensures your game files are in the right place for Capacitor
          cp -r . dist/ || echo "No files to copy"

      - name: Build Android
        run: |
          npm install @capacitor/core @capacitor/android@6.2.1
          npx cap add android || echo "Platform exists"
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Locate and Upload APK
        run: |
          # This command finds the actual file path
          find . -name "*.apk" > apk_path.txt
          cat apk_path.txt
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OfflineGames-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
