name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Prepare Web Assets
        run: |
          # 1. Create a clean dist folder
          rm -rf dist
          mkdir -p dist
          # 2. Copy all your game files into dist 
          # (This assumes your main files are in the root directory)
          cp -r *.html *.js *.css assets/ 2>/dev/null || echo "Some files missing"
          # 3. Double check that index.html exists in dist
          ls -la dist/index.html

      - name: Add Android Platform
        run: |
          npm install @capacitor/android@6.2.1 --legacy-peer-deps
          npx cap add android

      - name: Sync Android
        run: |
          npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OfflineGames-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
