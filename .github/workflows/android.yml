name: Build Android APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node & Java
        uses: actions/setup-node@v4
        with: {node-version: 20}
      - uses: actions/setup-java@v4
        with: {java-version: '17', distribution: 'temurin'}

      - name: Build and Sync
        run: |
          npm install --legacy-peer-deps
          # Ensure Capacitor is installed
          npm install @capacitor/android@6.2.1
          # Add platform and sync
          npx cap add android || echo "Platform exists"
          npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          # Debugging: List files so we know where the APK went
          find . -name "*.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OfflineGames-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
