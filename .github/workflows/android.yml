name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Prepare Web Assets
        run: |
          mkdir -p dist
          cp index.html dist/index.html
          cp -r assets/ dist/ 2>/dev/null || echo "No assets"
          cp *.js dist/ 2>/dev/null || echo "No JS"
          cp *.css dist/ 2>/dev/null || echo "No CSS"

      - name: Add Android Platform
        run: |
          npm install @capacitor/android@6.2.1 --legacy-peer-deps
          npx cap add android

      - name: Sync Android
        run: |
          npx cap sync android

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          # This builds the release version
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OfflineGames-Release-APK
          # The release APK is usually found here
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
