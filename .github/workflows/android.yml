name: Build Android APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node & Java
        uses: actions/setup-node@v4
        with: {node-version: 20}
      - uses: actions/setup-java@v4
        with: {java-version: '17', distribution: 'temurin'}

      - name: Create dist folder
        run: |
          mkdir -p dist
          # Copy your game files into the dist folder
          cp index.html dist/
          cp -r assets/ dist/ 2>/dev/null || echo "No assets"
          cp *.js dist/ 2>/dev/null || echo "No JS"
          cp *.css dist/ 2>/dev/null || echo "No CSS"

      - name: Build and Sync
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/android@6.2.1
          npx cap add android || echo "Platform exists"
          npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OfflineGames-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
