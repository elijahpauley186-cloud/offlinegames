name: Build Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Capacitor Init
        run: npx cap init "Offline Games" com.dumbgames.offlinegames --web-dir dist

      - name: Prepare Web Assets
        run: |
          mkdir -p dist
          rsync -av --exclude='ios' --exclude='.github' --exclude='.git' --exclude='node_modules' . dist/

      - name: Add and Sync iOS
        run: |
          npx cap add ios
          npx cap sync ios

      # Generate icons AFTER sync so they replace the default Capacitor icons
      - name: Install Assets Tool
        run: npm install @capacitor/assets --save-dev

      - name: Generate Icons
        run: npx @capacitor/assets generate --ios

      - name: Build Unsigned Archive
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -destination generic/platform=iOS \
            -archivePath build/App.xcarchive archive \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

      - name: Create Unsigned IPA
        run: |
          mkdir -p Payload
          # Copy the .app folder from the archive to the Payload directory
          cp -r ios/App/build/App.xcarchive/Products/Applications/*.app Payload/
          # Create the final IPA zip
          zip -r Offline-Games.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Offline-Games-IPA
          path: Offline-Games.ipa
