name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm install

      - name: Capacitor Init
        run: npx cap init "Offline Games" com.dumbgames.offlinegames

      - name: Add iOS
        run: npx cap add ios

      - name: Copy Files
        run: |
          mkdir -p ios/App/App/public
          cp -R . ios/App/App/public/ 2>/dev/null || true

      - name: Sync
        run: npx cap sync ios

      - name: Build IPA
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -destination generic/platform=iOS \
            -archivePath build/App.xcarchive archive \
            CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

          xcodebuild -exportArchive -archivePath build/App.xcarchive \
            -exportOptionsPlist ../../exportOptions.plist \
            -exportPath build/output

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Offline-Games-IPA
          path: ios/App/build/output/*.ipa
