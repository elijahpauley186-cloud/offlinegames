name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm install

      - name: Capacitor Init
        run: npx cap init "Offline Games" com.dumbgames.offlinegames --web-dir dist

      - name: Prepare Web Assets
        run: |
          mkdir -p dist
          rsync -av --exclude='ios' --exclude='.github' --exclude='.git' --exclude='node_modules' . dist/

      - name: Add iOS
        run: npx cap add ios

      - name: Sync
        run: npx cap sync ios

      - name: Build Archive
        run: |
          cd ios/App
          # This command builds your app into an xcarchive folder
          xcodebuild -workspace App.xcworkspace -scheme App -destination generic/platform=iOS \
            -archivePath build/App.xcarchive archive \
            CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

      - name: Upload Archive
        uses: actions/upload-artifact@v4
        with:
          name: Offline-Games-Archive
          path: ios/App/build/App.xcarchive
