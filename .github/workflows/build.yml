name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build App
        run: |
          npx cap init "Offline Games" com.dumbgames.offlinegames --web-dir dist
          mkdir -p dist
          rsync -av --exclude='ios' --exclude='.github' --exclude='.git' --exclude='node_modules' . dist/
          npx cap add ios
          npx cap sync ios
          npm install @capacitor/assets --save-dev
          npx @capacitor/assets generate --ios

      - name: Build Archive
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -destination generic/platform=iOS \
            -archivePath build/App.xcarchive archive \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r ios/App/build/App.xcarchive/Products/Applications/*.app Payload/
          # Zip into a file specifically named with the .ipa extension
          zip -r OfflineGames.ipa Payload/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: OfflineGames
          path: OfflineGames.ipa
