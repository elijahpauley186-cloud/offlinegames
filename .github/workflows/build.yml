name: Build Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      # 1. Init Capacitor
      - name: Capacitor Init
        run: npx cap init "Offline Games" com.dumbgames.offlinegames --web-dir dist

      # 2. Prepare Web Assets
      - name: Prepare Web Assets
        run: |
          mkdir -p dist
          rsync -av --exclude='ios' --exclude='.github' --exclude='.git' --exclude='node_modules' . dist/

      # 3. Add and Sync to create the iOS project
      - name: Add iOS
        run: npx cap add ios

      - name: Sync iOS
        run: npx cap sync ios

      # 4. Generate Icons (Runs AFTER sync to ensure they stick)
      - name: Install Assets Tool
        run: npm install @capacitor/assets --save-dev

      - name: Generate Icons
        run: npx @capacitor/assets generate --ios

      # 5. Build Archive
      - name: Build Unsigned Archive
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -destination generic/platform=iOS \
            -archivePath build/App.xcarchive archive \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

      # 6. Create IPA
      - name: Create Unsigned IPA
        run: |
          mkdir -p Payload
          cp -r ios/App/build/App.xcarchive/Products/Applications/*.app Payload/
          zip -r Offline-Games.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Offline-Games-IPA
          path: Offline-Games.ipa
