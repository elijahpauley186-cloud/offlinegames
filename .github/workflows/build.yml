name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm install

      - name: Init and Build
        run: |
          npx cap init "Offline Games" com.dumbgames.offlinegames --web-dir dist
          mkdir -p dist
          rsync -av --exclude='ios' --exclude='.github' --exclude='.git' --exclude='node_modules' . dist/
          npx cap add ios
          npx cap sync ios

      # Generate icons specifically
      - name: Setup Icons
        run: |
          npm install @capacitor/assets --save-dev
          npx @capacitor/assets generate --ios

      # Build the app structure
      - name: Build Archive
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -destination generic/platform=iOS \
            -archivePath build/App.xcarchive archive \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

      # Create a simple, clean IPA folder structure
      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r ios/App/build/App.xcarchive/Products/Applications/*.app Payload/
          # Create a flat, clean zip file
          zip -r -9 Offline-Games-Final.ipa Payload/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Offline-Games-Final
          path: Offline-Games-Final.ipa
