name: Build Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm install

      - name: Capacitor Init
        run: npx cap init "Offline Games" com.dumbgames.offlinegames --web-dir dist

      - name: Prepare Web Assets
        run: |
          mkdir -p dist
          rsync -av --exclude='ios' --exclude='.github' --exclude='.git' --exclude='node_modules' . dist/

      - name: Add iOS
        run: npx cap add ios

      - name: Sync
        run: npx cap sync ios

      - name: Build Unsigned Archive
        run: |
          cd ios/App
          # Perform the archive without code signing
          xcodebuild -workspace App.xcworkspace -scheme App -destination generic/platform=iOS \
            -archivePath build/App.xcarchive archive \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

      - name: Create Unsigned IPA
        run: |
          # The IPA structure requires a 'Payload' folder
          mkdir -p Payload
          # Copy the built app from the archive into the Payload folder
          cp -r ios/App/build/App.xcarchive/Products/Applications/*.app Payload/
          # Zip the Payload folder
          zip -r Offline-Games.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Offline-Games-IPA
          path: Offline-Games.ipa
